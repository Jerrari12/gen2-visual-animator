name: Deploy viewer to GitHub Pages

# Publishes the viewer/ folder to GitHub Pages on every push to main.
# The rest of the repo (notes, GLB Pipeline, CLAUDE.md) stays versioned but unserved.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: viewer
      - id: deployment
        uses: actions/deploy-pages@v4
